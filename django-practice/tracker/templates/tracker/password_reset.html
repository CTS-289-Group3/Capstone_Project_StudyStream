<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - StudyStream</title>
</head>
<body>
    <h1>Forgot Password</h1>
    <p>Enter your email and we'll send you a reset link.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send Reset Link</button>
    </form>
    <p><a href="/login/">Back to Login</a></p>
</body>
</html>
