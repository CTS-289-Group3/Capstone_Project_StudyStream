{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-dark: #034EA2;
            --bg: #F4F7FB;
            --surface: #FFFFFF;
            --text: #1A2540;
            --muted: #6B7A99;
            --border: #E4EAF4;
            --shadow: 0 2px 16px rgba(3,78,162,0.08);
            --radius: 14px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 28px 16px;
        }

        .ss-wrap { max-width: 760px; margin: 0 auto; }

        .ss-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 28px;
            color: var(--blue-dark);
        }

        .ss-sub {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 14px;
        }

        .ss-form p { margin: 0 0 14px; }

        .ss-form label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }

        .ss-form input,
        .ss-form select {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            background: #fff;
            color: var(--text);
        }

        .errorlist {
            margin: 0 0 8px;
            padding: 8px 10px;
            list-style: none;
            border-radius: 8px;
            background: #FFE8E8;
            color: #7B1B1B;
            font-size: 13px;
        }

        .ss-actions { display: flex; gap: 10px; margin-top: 18px; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }

        .btn-primary { background: var(--blue-dark); color: #fff; }

        .btn-secondary {
            background: #fff;
            color: var(--blue-dark);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="ss-wrap">
        <div class="ss-card">
            <h1>{{ page_title }}</h1>
            <p class="ss-sub">Save a reusable job title that appears as a quick pick when adding work shifts.</p>

            <form method="post" class="ss-form">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="ss-actions">
                    <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
                    <a href="{% url 'recurring_job_title_list' %}" class="btn btn-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
